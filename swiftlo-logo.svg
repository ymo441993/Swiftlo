<svg width="260" height="64" viewBox="0 0 260 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arcGrad" x1="8" y1="56" x2="56" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2DFFD0"/>
      <stop offset="50%"  stop-color="#9D6BFF"/>
      <stop offset="100%" stop-color="#6B1FFF"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="32" y1="13" x2="32" y2="51" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C8B0FF"/>
    </linearGradient>
    <radialGradient id="bgDeep" cx="50%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#1A0A38"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="52%">
      <stop offset="0%"   stop-color="#7C3AFF" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#7C3AFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="arcGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boltGlow" x="-50%" y="-30%" width="200%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="wordGrad" x1="80" y1="0" x2="260" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F0EFFB"/>
      <stop offset="100%" stop-color="#C8C6E8"/>
    </linearGradient>
  </defs>

  <!-- Icon background (64x64) -->
  <rect width="64" height="64" rx="14" fill="url(#bgDeep)"/>
  <rect width="64" height="64" rx="14" fill="url(#bgGlow)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" stroke="rgba(255,255,255,0.07)" stroke-width="1" fill="none"/>

  <!-- Arc: center (32,32), r=21.5, start (50.6,42.75), end (50.6,21.25) -->
  <path d="M 50.6 42.75 A 21.5 21.5 0 1 1 50.6 21.25"
        stroke="url(#arcGrad)" stroke-width="9" stroke-linecap="round" opacity="0.2"/>
  <path d="M 50.6 42.75 A 21.5 21.5 0 1 1 50.6 21.25"
        stroke="url(#arcGrad)" stroke-width="5.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M 50.6 42.75 A 21.5 21.5 0 1 1 50.6 21.25"
        stroke="url(#arcGrad)" stroke-width="3.2" stroke-linecap="round"
        filter="url(#arcGlow)"/>

  <!-- Endpoint dots -->
  <circle cx="50.6" cy="42.75" r="2.5" fill="#2DFFD0" filter="url(#dotGlow)"/>
  <circle cx="50.6" cy="21.25" r="2.5" fill="#7C3AFF" filter="url(#dotGlow)"/>

  <!-- Bolt (scaled: 112→36, 42→13, 76→24.5, 106→34, 101→32.5, 88→28.5, 158→50.5, 124→39.8, 94→30.2, 99→31.8) -->
  <!-- Scale factor: 64/200 = 0.32 -->
  <path d="M 35.8 13.4 L 24.3 33.9 L 32.3 33.9 L 28.2 50.6 L 39.7 30.1 L 31.7 30.1 Z"
        fill="rgba(160,130,255,0.2)" filter="url(#boltGlow)"/>
  <path d="M 35.8 13.4 L 24.3 33.9 L 32.3 33.9 L 28.2 50.6 L 39.7 30.1 L 31.7 30.1 Z"
        fill="url(#boltGrad)" filter="url(#boltGlow)"/>

  <!-- Wordmark -->
  <text x="80" y="43"
        font-family="'Space Grotesk', 'Arial', sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="-1.2"
        fill="url(#wordGrad)">Swiftlo</text>

</svg>
