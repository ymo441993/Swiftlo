<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Arc gradient: teal → violet, diagonal -->
    <linearGradient id="arcGrad" x1="30" y1="170" x2="170" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2DFFD0"/>
      <stop offset="50%"  stop-color="#9D6BFF"/>
      <stop offset="100%" stop-color="#6B1FFF"/>
    </linearGradient>

    <!-- Bolt gradient: white → soft violet -->
    <linearGradient id="boltGrad" x1="100" y1="42" x2="100" y2="158" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C8B0FF"/>
    </linearGradient>

    <!-- Background deep gradient -->
    <radialGradient id="bgDeep" cx="50%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#1A0A38"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>

    <!-- Purple center glow -->
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="52%">
      <stop offset="0%"   stop-color="#7C3AFF" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#7C3AFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Teal floor accent -->
    <radialGradient id="bgTeal" cx="50%" cy="82%" r="40%">
      <stop offset="0%"   stop-color="#2DFFD0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2DFFD0" stop-opacity="0"/>
    </radialGradient>

    <!-- Arc outer glow filter -->
    <filter id="arcGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Bolt glow filter -->
    <filter id="boltGlow" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot glow filter -->
    <filter id="dotGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Top edge highlight (simulates light source) -->
    <linearGradient id="edgeLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

  </defs>

  <!-- Background layers -->
  <rect width="200" height="200" rx="44" fill="url(#bgDeep)"/>
  <rect width="200" height="200" rx="44" fill="url(#bgGlow)"/>
  <rect width="200" height="200" rx="44" fill="url(#bgTeal)"/>
  <!-- Subtle top highlight -->
  <rect width="200" height="200" rx="44" fill="url(#edgeLight)"/>
  <!-- 1px inner border -->
  <rect x="0.75" y="0.75" width="198.5" height="198.5" rx="43.5" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" fill="none"/>

  <!-- Arc: 300° ring, gap on right side (~30° to 330°) -->
  <!-- Center (100,100), radius 67, start (158,133.5), end (158,66.5) -->

  <!-- Outer glow ring -->
  <path d="M 158 133.5 A 67 67 0 1 1 158 66.5"
        stroke="url(#arcGrad)" stroke-width="30" stroke-linecap="round"
        opacity="0.2"/>

  <!-- Mid glow ring -->
  <path d="M 158 133.5 A 67 67 0 1 1 158 66.5"
        stroke="url(#arcGrad)" stroke-width="18" stroke-linecap="round"
        opacity="0.35"/>

  <!-- Main arc -->
  <path d="M 158 133.5 A 67 67 0 1 1 158 66.5"
        stroke="url(#arcGrad)" stroke-width="10" stroke-linecap="round"
        filter="url(#arcGlow)"/>

  <!-- Endpoint node dots -->
  <circle cx="158" cy="133.5" r="7"  fill="#2DFFD0" filter="url(#dotGlow)" opacity="0.9"/>
  <circle cx="158" cy="133.5" r="3.5" fill="#FFFFFF"/>

  <circle cx="158" cy="66.5" r="7"  fill="#7C3AFF" filter="url(#dotGlow)" opacity="0.9"/>
  <circle cx="158" cy="66.5" r="3.5" fill="#FFFFFF"/>

  <!-- Lightning bolt (centered, tight proportions) -->
  <!-- Outer glow pass -->
  <path d="M 112 42 L 76 106 L 101 106 L 88 158 L 124 94 L 99 94 Z"
        fill="rgba(160,130,255,0.25)" filter="url(#boltGlow)"/>
  <!-- Main bolt -->
  <path d="M 112 42 L 76 106 L 101 106 L 88 158 L 124 94 L 99 94 Z"
        fill="url(#boltGrad)" filter="url(#boltGlow)"/>

</svg>
